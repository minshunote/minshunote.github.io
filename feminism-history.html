<h1>フェミニズムの歴史</h1>

<h2>概要</h2>
<p>
フェミニズムは、女性の権利拡大や男女平等の実現を目指す思想および社会運動の総称である。
</p>

<h2>19世紀から20世紀初頭</h2>
<p>
欧米では女性参政権運動が展開された。
</p>

<h2>第二波フェミニズム</h2>
<p>
1960年代から1970年代にかけて、雇用や教育など幅広い分野での平等が議論された。
</p>

<h2>第三波以降</h2>
<p>
多様な価値観やアイデンティティに注目する議論が広がった。
</p>
